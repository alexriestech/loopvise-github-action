name: Run Loopvise suite (example)

on:
  workflow_dispatch:
    inputs:
      suite_id:
        description: Loopvise suite id
        required: true
        type: string
      space_id:
        description: Loopvise space id
        required: true
        type: string
      environment_id:
        description: Loopvise environment id (optional)
        required: false
        type: string
        default: ''
      browser:
        description: Optional browser
        required: false
        type: string
        default: ''
      triggered_by_user_id:
        description: Optional triggered-by user id
        required: false
        type: string
        default: ''
      environment_url:
        description: Optional environment URL or host
        required: false
        type: string
        default: ''
      environment_variables:
        description: Optional JSON object string for environment variables
        required: false
        type: string
        default: ''

jobs:
  loopvise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: suite
        uses: ./
        with:
          suite_id: ${{ inputs.suite_id }}
          space_id: ${{ inputs.space_id }}
          environment_id: ${{ inputs.environment_id }}
          environment_url: ${{ inputs.environment_url }}
          environment_variables: ${{ inputs.environment_variables }}
          browser: ${{ inputs.browser }}
          triggered_by_user_id: ${{ inputs.triggered_by_user_id }}
      - run: echo "suite_run_id=${{ steps.suite.outputs.suite_run_id }}"
